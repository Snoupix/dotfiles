# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█

windowrule = match:class ^(Steam)$ opacity 0.60 0.60
windowrule = match:class ^(steam)$ opacity 0.60 0.60
windowrule = match:class ^(steamwebhelper)$ opacity 0.60 0.60
windowrule = match:class ^(Spotify)$ opacity 0.70 0.70
windowrule = match:class ^(Discord)$ opacity 0.75 0.75
windowrule = match:class ^(discord)$ opacity 0.75 0.75

# Discord screen share
windowrule = match:class ^(xwaylandvideobridge)$ opacity 0.0 override 0.0 override
windowrule = match:class ^(xwaylandvideobridge)$ noanim
windowrule = match:class ^(xwaylandvideobridge)$ nofocus
windowrule = match:class ^(xwaylandvideobridge)$ noinitialfocus


#█░█ █▀▄▀█
#▀▄▀ █░▀░█

bind = CTRL Alt_L, V, submap, passthrough
submap = passthrough
bind = CTRL Alt_L, V, submap, reset
submap = reset

